name: GRUS Certification Audit

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 0 * * 0'

jobs:
  audit:
    runs-on: ubuntu-latest
    name: GRUS Validated-Fact Audit Pipeline
    steps:
      - name: Checkout submission repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install GRUS Audit Engine dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pyyaml cryptography

      - name: Materialize LLC private key from secret
        env:
          PRIVATE_KEY: ${{ secrets.GRUS_PRIVATE_KEY }}
        run: |
          mkdir -p /tmp/grus_keys
          echo "$PRIVATE_KEY" > /tmp/grus_keys/private_key.pem
          chmod 600 /tmp/grus_keys/private_key.pem

      - name: Run GRUS audit against local physics files
        run: |
          python audit_runner.py . \
            --ledger-dir ./grus-ledger \
            --private-key /tmp/grus_keys/private_key.pem

      - name: Upload citation manifest
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: citation-manifest
          path: ./CITATION_MANIFEST.yaml

      - name: Upload audit result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grus-audit-result
          path: |
            ./CITATION_MANIFEST.yaml
            ./grus_audit_result.yaml

      - name: Clean up materialized key
        if: always()
        run: rm -rf /tmp/grus_keys
